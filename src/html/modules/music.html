
<section class="music" id="musica">
  <div class="container music__container">
    <header class="section-intro music__intro">
      <h2 class="section-intro__title">Música</h2><span class="section-intro__line"></span>
      <p class="section-intro__lead">Escucha en Spotify y mira presentaciones en YouTube.</p>
    </header>
    <div class="music__grid">
      <article class="music__card music__card--spotifyFollow">
        <h3 class="music__card-title">Sígueme en Spotify</h3>
        <div class="music__embed music__embed--follow">
          <iframe class="music__iframe" src="https://open.spotify.com/follow/1/?uri=spotify:artist:0LyfQWJT6nXafLPZqxe9Of&amp;size=detail&amp;theme=dark" title="Sígueme en Spotify" loading="lazy" allow="encrypted-media"></iframe>
        </div><a class="btn btn--primary music__follow" href="https://open.spotify.com/" target="_blank" rel="noopener noreferrer">Follow</a>
      </article>
      <article class="music__card music__card--youtube">
        <h3 class="music__card-title">Video destacado</h3>
        <div class="music__embed music__embed--video">
          <iframe class="music__iframe" src="https://www.youtube.com/embed/83V1s0BgYNI" title="Video destacado" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="allowfullscreen"></iframe>
        </div>
      </article>
      <article class="music__card music__card--spotifyPlaylist">
        <h3 class="music__card-title">Playlist destacada</h3>
        <div class="music__embed music__embed--playlist">
          <iframe class="music__iframe" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator&amp;theme=0" title="Playlist destacada" loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>
      </article>
    </div>
  </div>
</section>
